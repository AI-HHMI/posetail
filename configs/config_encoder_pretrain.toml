[wandb]
project_name = 'posetail-pretraining-v3'
path = '/groups/karashchuk/home/karashchukl/results/posetail-pretraining-v3'
mode = 'online' # 'online', 'offline', 'disabled'

[dataset]
# batch_size=1 REQUIRED for mixed 2D+3D (2D loss assumes B=cams=1). Multi-GPU: --strategy ddp.
batch_size = 1
num_workers = 12
prefix = '/groups/karashchuk/karashchuklab/animal-datasets-processed/posetail-pretraining-v3'

[dataset.train]
split_dir = 'train'
n_frames = 16
min_res = 256
max_res = 256
cams_to_sample = [1, 8]
kpts_to_sample = [128, 128]
aug_prob = 0.25
enable_kpt_filtering = false
cam_thresh_for_vis = 1
balance_datasets = true
n_samples_per_dataset = -1
crop_to_points = true
speed_thresh = 3.0   # ignored in speed_target mode (kept for legacy fallback)
query_anytime = true
query_edge_bias = 200.0
prop_dynamic_kpts_to_sample = 0.95
prob_2d_only = 0.25
# Speed-targeted 3D crop: solve the crop size so a coherent cluster realizes a target
# per-track head-speed drawn from crop_3d_fraction = [s_lo, s_hi] (head-speed BAND; keep
# s_hi == head_3d_grid_radius). Fills the gridresid edge bins, equalized across datasets.
# Validated in scripts/speed_target_coverage.py.
sampling_mode = 'speed_target'
crop_3d_enabled = true
crop_3d_fraction = [0.5, 1.8]   # target head-speed band (s_hi == head_3d_grid_radius)
crop_3d_prob = 0.4
crop_3d_ref_pct = 97.0          # percentile of per-axis residual pinned to s* (low OOG)
crop_3d_high_bias = 0.5         # bias s* toward the high end (counters the 0->peak ramp)
# No causal_masking: the encoder's temporal self-attention is bidirectional (TapNext-only).

[dataset.train.curriculum]
enabled = false
ramp_start_frac = 0.0
ramp_end_frac   = 0.4
intensity_floor = 0.0

[dataset.val]
split_dir = 'val'
n_frames = 16
max_res = 256
cams_to_sample = 5
kpts_to_sample = 128
aug_prob = 0.0
crop_to_points = true
speed_thresh = 1.0
prop_dynamic_kpts_to_sample = 0.7
query_anytime = false

[dataset.test]
split_dir = 'test'
max_res = 256
n_frames = 16
project_2d = false
aug_prob = 0.0

[devices]
device = 'cuda'


[model]
mode_3d = "encoder"

video_encoder_version = 'large'
# VJEPA backbone frozen for all of pretraining; finetuning unlocks the whole encoder.
video_encoder_requires_grad = false
video_encoder_hierarchical = true

# Inert while the encoder is frozen.
video_encoder_finetune_last_n_layers = 12

soft_argmax_temperature_learnable = true

# processing
stride_length = 16
stride_overlap = 4
unroll_windows = false
image_size = 256
query_patch_size = 9
per_camera_cube_scale = true

# query encoder
max_freq = 10
embedding_dim = 256
use_volume_embedding = false
corr_radius = 2
principal_point_embedding = true
intrinsic_embedding = true
metric_ray_translation = true

# decoder
latent_dim = 512
n_heads = 8
n_time_space_blocks = 6
embedding_factor = 4
use_camera_self_attention = true
use_temporal_self_attention = true
f_eff_scale = true
# Projecting encoder features to the decoder dim trains notably better than false.
scene_encoder_proj = true

cross_attn_dim = 512

scene_proj_dim = 512
scene_proj_prenorm = false
scene_proj_mlp = false


# "gridresid" = per-axis soft-argmax bin grid (CE-supervised): 3D head emits a motion residual
# from a query anchor, depth is a log grid, plus a 2D pixel-bin position head.
#

# without subpixel
# Grid grounded on the actual pretraining-v3 A/B: pi2fpadz (eps=0.1, thr=60) beat yn5g6tas
# (eps=0.05, thr=70). Pretraining models keep a BROAD soft-argmax (temp ~0.47, not the 0.99 of
# the finetuned 39yczenk in gridresid_combined.md), so the smaller reach (0.345) denoises better
# than the report's reach~0.5 rule -- that rule only holds once the softmax sharpens.
# eps is baked into the learned bin centers => fixed through finetuning; thr is decode-time only
# and can be raised at finetune if the model sharpens temp (reach~0.5 => thr~87 at eps=0.1).
output_mode = "gridresid"
head_3d_grid_size = 1024              # 512 = ~half the head memory, ~no observable accuracy loss
head_3d_grid_radius = 1.8            # OOG=0% at 16 frames; == crop_3d_fraction s_hi (speed-target band top)
log_3d_output = true
log_3d_eps = 0.1                     # pretraining A/B winner (pi2fpadz); fixed through finetuning
soft_argmax_threshold = 60          # reach = 60*2*ln(19)/1024 ~= 0.345 (broad-softmax optimum); retune at finetune
grid_decode_space = "warped"
enable_subpixel_refinement = false

# gridresid with subpixel refinement
# output_mode = "gridresid"
# head_3d_grid_size = 512
# head_3d_grid_radius = 1.8
# log_3d_output = true
# log_3d_eps = 0.1
# enable_subpixel_refinement = true
# subpixel_scale = 0.6


# Depth log-grid range = log(depth/(cube*f_eff)); covers every dataset's reach with margin.
depth_log_min = -2.5
depth_log_max = 2.5


[training]
seed = 3
n_iterations = 800000
scheduler_type = 'muon'
max_grad_norm = 50.0
checkpoint_freq = 10240 # in iterations
eval_metric_freq = 16 # in iterations
val_freq = 64 # in iterations
print_freq = 128 # in iterations
debug_ix = -1 # only works for val

[training.optimizer]
# Decoder trains from scratch on the frozen backbone -> 5e-4 base LR (6i8ryveg). encoder_lr_scale
# moot (encoder frozen).
learning_rate = 5e-4
muon_schedulefree = true
weight_decay = 0.002
warmup_steps = 2000
muon_warmup_steps = 2000
beta1 = 0.9
beta2 = 0.95

encoder_lr_scale = 1.0

[training.scheduler]

[training.losses]
gamma = 0.8
pixel_thresh = 3
delta = 4
use_huber_loss = true

# weights for calculating total loss (use 0 to not compute a specific loss)
vis_loss_weight = 5.0
vis_loss_3d_weight = 1.0
conf_loss_weight = 0.0
conf_2d_loss_weight = 0.0

occluded_coords_loss_weight = 0.1
feature_loss_weight = 0.0

# Reweight
coords_loss_weight = 0.1
coords_loss_direct_weight = 0.1
coords_loss_rays_weight = 0.0
coords_loss_triangulate_weight = 0.0
coords_loss_2d_weight = 1.5
coords_loss_depth_weight = 0.5

# reproj weights
coords_loss_direct_reproj_weight = 1.0
coords_loss_rays_reproj_weight = 0.05
coords_loss_triangulate_reproj_weight = 1.0

# Position-bin CE raised back to a meaningful auxiliary. depth highest: the one CE term that
# actually descends.
coords_softmax_2d_weight = 0.6
coords_softmax_3d_weight = 0.4
depth_softmax_weight = 1.5

# Rescale of the multi-cam 3D loss branch; lowered 500->150 to revive direct 3D regression
# there. If 2d_loss/mte degrade early the branch is too hot, raise back up.
coords_3d_loss_scale = 50.0

smoothness_loss_3d_weight = 0.5
smoothness_loss_2d_weight = 0.5
smoothness_loss_order = 4
smoothness_loss_tolerance = 1.5
